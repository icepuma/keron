[workspace]
resolver = "3"
members = [
    "crates/keron-lang",
    "crates/keron-modules",
    "crates/keron-apply",
    "crates/keron-cli",
]

[workspace.package]
version = "0.0.0"
edition = "2024"
rust-version = "1.95.0"
license = "MIT OR Apache-2.0"
repository = "https://github.com/icepuma/keron"
authors = ["Stefan Ruzitschka <stefan@icepuma.dev>"]

[workspace.dependencies]
keron-lang = { path = "crates/keron-lang", version = "=0.0.0" }
keron-modules = { path = "crates/keron-modules", version = "=0.0.0" }
keron-apply = { path = "crates/keron-apply", version = "=0.0.0" }

chumsky = "=0.13.0"
thiserror = "=2.0.18"
ariadne = "=0.6.0"

anyhow = "=1.0.102"
clap = { version = "=4.6.1", features = ["derive"] }
petgraph = "=0.8.3"

insta = "=1.47.2"
libtest-mimic = "=0.8.2"
bolero = "=0.13.4"
proptest = "=1.11.0"

[workspace.lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
multiple_crate_versions = "allow"
cargo_common_metadata = "allow"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"

[profile.dev]
opt-level = 0
