[workspace]
resolver = "3"
members = [
    "crates/keron-lang",
    "crates/keron-modules",
    "crates/keron-apply",
    "crates/keron-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95.0"
license = "MIT OR Apache-2.0"
repository = "https://github.com/icepuma/keron"
authors = ["Stefan Ruzitschka <stefan@icepuma.dev>"]

[workspace.dependencies]
keron-lang = { path = "crates/keron-lang", version = "=0.1.0" }
keron-modules = { path = "crates/keron-modules", version = "=0.1.0" }
keron-apply = { path = "crates/keron-apply", version = "=0.1.0" }

chumsky = "=0.13.0"
thiserror = "=2.0.18"
ariadne = "=0.6.0"

anyhow = "=1.0.102"
clap = { version = "=4.6.1", features = ["derive"] }
petgraph = "=0.8.3"
os_info = { version = "=3.15.0", default-features = false }
# Cross-platform standard directories. On Linux these follow the
# XDG Base Directory spec (with documented fallbacks when the env
# vars are unset); on macOS they map to `~/Library/...` and on
# Windows to the corresponding `Known Folder`. Used by the
# `std:host` builtins (`config_dir`, `cache_dir`, etc.) so manifests
# don't have to assemble these paths by hand.
dirs = "=6.0.0"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
libc = "=0.2.186"
# Jinja2-style template engine for `template(...)` resources.
# `default-features = false` drops the optional builtin filter
# bundle (chrono / chrono-tz / humansize / rand / slug / urlencode);
# the core engine still ships standard filters like `upper`, `lower`,
# `replace`, `default`, `trim`, `length` that are sufficient for the
# dotfile use case. The full bundle can be re-enabled later if a
# manifest needs e.g. date formatting.
tera = { version = "=1.20.1", default-features = false }
which = "=8.0.2"
# Pinned platform binding for the elevated-rights flow on Windows:
# parent-side SID capture (`OpenProcessToken` + `GetTokenInformation` +
# `ConvertSidToStringSidW`), child-side ownership transfer
# (`SetSecurityInfo` on a `CreateFileW` handle opened with
# `FILE_FLAG_OPEN_REPARSE_POINT` so symlinks get the link's owner, not
# the target's), and the `ShellExecuteExW` re-exec with the `runas`
# verb that triggers UAC. Used only behind `#[cfg(windows)]`.
windows-sys = { version = "=0.61.2", default-features = false, features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Security_Authorization",
    "Win32_System_Threading",
    "Win32_System_Memory",
    "Win32_Storage_FileSystem",
    "Win32_UI_Shell",
] }

insta = "=1.47.2"
libtest-mimic = "=0.8.2"
bolero = "=0.13.4"
proptest = "=1.11.0"
# `#[mutants::skip]` markers for cargo-mutants; the crate itself is
# a no-op shim providing the attribute path so the compiler accepts
# the annotation under `cfg(test)`.
mutants = "=0.0.4"

[workspace.lints.rust]
# `deny` rather than `forbid` so test modules can opt into a small,
# well-scoped `unsafe` block (e.g. `std::env::set_var`, which became
# `unsafe` in edition 2024) via `#[allow(unsafe_code)]`. Production
# code still errors out — the lint default applies everywhere except
# the explicitly-tagged sites.
unsafe_code = "deny"
missing_debug_implementations = "warn"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
multiple_crate_versions = "allow"
cargo_common_metadata = "allow"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"

[profile.dev]
opt-level = 0
