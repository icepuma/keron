name = "Keron"
grammar = "keron"
path_suffixes = ["keron"]
line_comments = ["# "]
language_servers = ["keron-lsp"]

# Keep keron's "no semicolon at top level" rule visible in the editor
# by treating `;` only as a chain separator inside `reconcile { … }`.
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
]

auto_indent_using_last_non_empty_line = true
indent_size = 2
