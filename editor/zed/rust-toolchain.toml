# Walk-up `rust-toolchain.toml` discovery would otherwise land on
# `keron/rust-toolchain.toml` which pins `1.95.0`. That's fine for
# the main workspace but forces Zed-spawned cargo to install a
# specific version, which can fail in the Zed extension installer's
# environment. Pin `stable` here so the extension uses whatever
# rustup default the user already has.
[toolchain]
channel = "stable"
profile = "minimal"
targets = ["wasm32-wasip1"]
