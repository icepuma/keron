name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release from tag
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            slug: linux_amd64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            slug: linux_arm64
            use_cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            slug: darwin_arm64
            use_cross: false
          - os: macos-14
            target: x86_64-apple-darwin
            slug: darwin_amd64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure Rust target installed
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2.79.2
        with:
          tool: cross

      - name: Build release binary
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="keron_${version}_${{ matrix.slug }}.tar.gz"
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --locked --release -p keron-cli --target ${{ matrix.target }}
          else
            cargo build --locked --release -p keron-cli --target ${{ matrix.target }}
          fi

      - name: Package binary and checksum
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/keron" "dist/keron"
          (
            cd dist
            tar -czf "${ARCHIVE}" keron
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          )
          rm dist/keron

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.ARCHIVE }}
          path: |
            dist/${{ env.ARCHIVE }}
            dist/${{ env.ARCHIVE }}.sha256
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Assemble combined checksums file
        run: |
          version="${GITHUB_REF_NAME#v}"
          combined="dist/keron_${version}_checksums.txt"
          (cd dist && cat *.tar.gz.sha256) > "${combined}"
          echo "Combined checksums:"
          cat "${combined}"

      - name: Upload archives and checksums to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            dist/keron_${version}_darwin_arm64.tar.gz \
            dist/keron_${version}_darwin_amd64.tar.gz \
            dist/keron_${version}_linux_arm64.tar.gz \
            dist/keron_${version}_linux_amd64.tar.gz \
            "dist/keron_${version}_checksums.txt" \
            --clobber

      - name: Update Homebrew formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"

          git fetch origin main
          git checkout -B main origin/main

          ./scripts/update-homebrew-formula.sh \
            --tag "${TAG}" \
            --checksums "dist/keron_${version}_checksums.txt"

          if git diff --quiet --exit-code -- Formula/keron.rb; then
            echo "Formula already up to date."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/keron.rb
          git commit -m "chore(homebrew): update formula for ${TAG}"
          git push origin HEAD:main
