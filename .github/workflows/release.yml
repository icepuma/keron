name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate the whole pipeline on the test suite: a tag can be created on a
  # commit that never went through PR CI, so without this nothing stops
  # a red commit from being compiled, signed, and published as `latest`.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          components: rustfmt, clippy

      - name: Verify release tag matches package version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          package_version="$(
            cargo metadata --locked --no-deps --format-version 1 |
              jq -er '[.packages[] | select(.name == "keron-cli") | .version] |
                if length == 1 then .[0]
                else error("expected exactly one keron-cli package")
                end'
          )"
          expected_tag="v${package_version}"
          if [[ "${TAG}" != "${expected_tag}" ]]; then
            echo "release tag ${TAG} does not match keron-cli ${package_version}; expected ${expected_tag}" >&2
            exit 1
          fi

      - name: Install cargo-nextest
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: nextest@0.9.136
          fallback: none

      - name: fmt + clippy + tests
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo nextest run --workspace --all-features --locked --no-tests=pass

  build:
    needs: test
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - archive_suffix: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build_tool: zigbuild
            smoke_test: "true"
          - archive_suffix: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build_tool: zigbuild
            smoke_test: "false"
          - archive_suffix: aarch64-apple-darwin
            runner: macos-14
            target: aarch64-apple-darwin
            build_tool: cargo
            smoke_test: "true"
          - archive_suffix: x86_64-apple-darwin
            runner: macos-14
            target: x86_64-apple-darwin
            build_tool: cargo
            smoke_test: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Zig
        if: matrix.build_tool == 'zigbuild'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild
        if: matrix.build_tool == 'zigbuild'
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-zigbuild@0.22.3
          fallback: none

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          target: ${{ matrix.target }}

      # Per-target cache so the linux musl / macOS arm / macOS intel
      # builds don't churn the same key. `shared-key` (not `key`) lets
      # the action layer the lockfile / rustc-version hashes on top so
      # a lockfile change still invalidates correctly.
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary with cargo-zigbuild
        if: matrix.build_tool == 'zigbuild'
        run: cargo zigbuild --locked --release -p keron-cli --target "${{ matrix.target }}"

      - name: Build release binary with cargo
        if: matrix.build_tool == 'cargo'
        run: cargo build --locked --release -p keron-cli --target "${{ matrix.target }}"

      # Ad-hoc sign the macOS Mach-O so syspolicyd/AMFI gets a stable
      # code-directory hash on first run. Without this, an unsigned
      # binary triggers a one-time verification pause (30-90s) the
      # first time a user invokes `keron` after `brew install`.
      # No Apple Developer cert needed — ad-hoc is unsigned-by-identity
      # but still hashed, which is what AMFI caches.
      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - "./target/${{ matrix.target }}/release/keron"

      - name: Inspect binary
        run: file "./target/${{ matrix.target }}/release/keron"

      - name: Smoke test binary
        if: matrix.smoke_test == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          actual="$(./target/${{ matrix.target }}/release/keron --version)"
          expected="keron ${TAG#v}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "release binary reports ${actual}; expected ${expected}" >&2
            exit 1
          fi

      - name: Package release archive
        env:
          TAG: ${{ github.ref_name }}
        run: |
          archive_root="keron-${TAG}-${{ matrix.archive_suffix }}"
          package_dir="dist/${archive_root}"

          mkdir -p "$package_dir"
          cp "./target/${{ matrix.target }}/release/keron" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          tar -C dist -czf "dist/${archive_root}.tar.gz" "${archive_root}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package-${{ matrix.archive_suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      # Required by `actions/attest-build-provenance` to mint a signed,
      # publicly-verifiable provenance attestation for the release
      # artifacts (verify with `gh attestation verify <file> --repo …`).
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      - name: Write checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      # SLSA build provenance for the published tarballs. Gives users a
      # cryptographic chain from artifact to this workflow run, so the
      # self-attesting SHA256SUMS isn't the only integrity reference.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/*.tar.gz

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          # `overwrite_files` deliberately omitted (defaults false): a
          # re-pushed tag should fail loudly rather than silently swap
          # already-published, possibly-already-downloaded assets.
          prerelease: ${{ contains(github.ref_name, '-') }}
          tag_name: ${{ github.ref_name }}

      - name: Update Homebrew formula
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git fetch origin main
          git checkout -B main origin/main

          ./scripts/update-homebrew-formula.sh \
            --tag "${TAG}" \
            --checksums dist/SHA256SUMS

          if git diff --quiet --exit-code -- Formula/keron.rb; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/keron.rb
          git commit -m "chore(homebrew): update formula for ${TAG}"
          git push origin HEAD:main
