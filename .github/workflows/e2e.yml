name: e2e

# End-to-end suite that drives the real `keron` binary against
# realistic dotfile fixtures on every supported OS. Mirrors what a
# user would actually do: invoke `keron apply --execute` against a
# directory of `.keron` manifests, verify the resulting symlinks
# and package state, run a second time to assert idempotency.
#
# The unit + integration suite already runs on `just`; this workflow
# is the cross-OS coverage layer that local `just` runs can't provide.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref so PR force-pushes don't
# pile up parallel matrix jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # All three platforms always report — we want to know if a
      # change breaks one OS, not bail at the first failure.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        # Honours `rust-toolchain.toml` — the version pin (1.95.0)
        # lives in the repo, so any bump applies to CI without a
        # workflow edit.
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          # Distinct keys per OS so the cache doesn't churn between
          # Linux / macOS / Windows builds in the same matrix.
          shared-key: e2e-${{ matrix.os }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build keron
        run: cargo build --bin keron --locked

      - name: Demo — print the plan diff each e2e fixture produces
        # Visible record in the CI log of *what* the suite is
        # actually exercising — same fixtures + same binary the
        # `cargo nextest` step will run, just in plan-only mode
        # against a throwaway HOME so the diff is rendered without
        # any side effects. `cargo run --bin keron` handles
        # platform-specific binary paths for us.
        shell: bash
        env:
          KERON_E2E_MANAGER: ${{ runner.os == 'Windows' && 'winget' || 'brew' }}
          # The cache populator shells out to the real package
          # manager at plan time (`brew list` / `cargo install
          # --list` / `winget list`). brew isn't installed on
          # Ubuntu runners and winget isn't on Linux/macOS, so any
          # demo run that picks a non-native manager would fail
          # spawning the binary. The test seam bypasses the
          # shell-out and reports an empty cache instead — setting
          # all three is harmless because only the one matching
          # `KERON_E2E_MANAGER` is consulted.
          KERON_TEST_BREW_PACKAGES: ""
          KERON_TEST_CARGO_PACKAGES: ""
          KERON_TEST_WINGET_PACKAGES: ""
          # Linux + macOS export HOME from the runner; the bash
          # shell on Windows runners exports it too, so a single
          # `mktemp -d` works on all three.
          DEMO_HOME_PARENT: ${{ runner.temp }}
        run: |
          set -euo pipefail
          DEMO_HOME=$(mktemp -d -p "$DEMO_HOME_PARENT")
          export HOME="$DEMO_HOME"
          echo "::group::basic-dotfiles plan"
          cargo run --bin keron --locked -- apply crates/keron-cli/tests/fixtures/basic-dotfiles
          echo "::endgroup::"
          echo "::group::packages plan"
          cargo run --bin keron --locked -- apply crates/keron-cli/tests/fixtures/packages
          echo "::endgroup::"
          rm -rf "$DEMO_HOME"

      - name: Run e2e suite
        # `--no-fail-fast` so we see every failing scenario per run,
        # not just the first. `--success-output=immediate-final`
        # surfaces each test's captured stdout (the keron plan + apply
        # output) at the end of the run so a CI consumer can see
        # exactly what the binary produced even on green runs.
        run: |
          cargo nextest run -p keron-cli --test e2e --locked \
            --no-fail-fast --success-output=immediate-final
