name: e2e

# End-to-end suite that drives the real `keron` binary against
# realistic dotfile fixtures on every supported OS. Mirrors what a
# user would actually do: invoke `keron apply --execute` against a
# directory of `.keron` manifests, verify the resulting symlinks
# and package state, run a second time to assert idempotency.
#
# The unit + integration suite already runs on `just`; this workflow
# is the cross-OS coverage layer that local `just` runs can't provide.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref so PR force-pushes don't
# pile up parallel matrix jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: just (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Every OS reports independently — a Windows-only path failure
      # shouldn't cancel the macOS / Linux results.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Distinct keys per OS so the cache doesn't churn between
          # Linux / macOS / Windows builds in the same matrix.
          shared-key: gate-${{ matrix.os }}

      - name: Install just
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: just@1.51.0
          fallback: none

      - name: Install cargo-nextest
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: nextest@0.9.136
          fallback: none

      - name: Run repo gate
        # `shell: bash` for cross-platform consistency — the Windows
        # runner's default `pwsh` parses the recipe's compound commands
        # differently and would diverge from local Unix runs.
        shell: bash
        run: just

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # All three platforms always report — we want to know if a
      # change breaks one OS, not bail at the first failure.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # Honours `rust-toolchain.toml`, so a toolchain bump applies to
        # CI without a workflow edit.
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Distinct keys per OS so the cache doesn't churn between
          # Linux / macOS / Windows builds in the same matrix.
          shared-key: e2e-${{ matrix.os }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: nextest@0.9.136
          fallback: none

      - name: Build keron
        run: cargo build --bin keron --locked

      - name: Run e2e suite
        # Each test's `run()` helper echoes the captured keron stdout
        # (the plan diff + apply summary) through the test's own
        # `println!`, and `--success-output=immediate-final` surfaces
        # that captured output in the CI log at end-of-run on green
        # builds — so the workflow log shows exactly what every
        # `keron apply` invocation produced, without a separate demo
        # step. `--no-fail-fast` keeps every failing test visible per
        # run rather than bailing at the first.
        # `shell: bash` for cross-platform `\` line continuation —
        # the Windows runner's default `pwsh` parses `\` as a unary
        # operator and falls over.
        shell: bash
        run: |
          cargo nextest run -p keron-cli --locked \
            --no-fail-fast --success-output=immediate-final

  editors:
    name: editor extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          target: wasm32-wasip1

      - name: Check Zed extension
        run: cargo check --manifest-path editors/zed/Cargo.toml --target wasm32-wasip1 --locked

      - name: Install locked VS Code dependencies
        working-directory: editors/vscode
        run: npm ci --ignore-scripts

      - name: Compile VS Code extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Package VS Code extension
        working-directory: editors/vscode
        run: npm run package -- --out "${RUNNER_TEMP}/keron.vsix"

      - name: Install locked tree-sitter tooling
        working-directory: tree-sitter-keron
        run: npm ci

      - name: Verify tree-sitter generated sources and corpus
        working-directory: tree-sitter-keron
        run: |
          npm run generate
          git diff --exit-code -- src
          npm test
