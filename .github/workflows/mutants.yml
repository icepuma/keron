name: Mutants

on:
  workflow_dispatch:
  schedule:
    # 03:00 UTC Monday is Sunday night in US time zones.
    - cron: "0 3 * * 1"

concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mutants:
    name: cargo mutants
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: mutants-ubuntu-latest

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Run full mutation suite
        run: |
          env -u CARGO_TARGET_DIR cargo mutants \
            --workspace \
            --all-features \
            --cargo-arg=--locked \
            --test-tool nextest \
            -j2

      - name: Upload mutants output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutants-out
          path: mutants.out
          if-no-files-found: ignore
          retention-days: 14
