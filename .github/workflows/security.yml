name: Security

on:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - ".node-version"
      - "deny.toml"
      - "crates/**/Cargo.toml"
      - "editors/zed/Cargo.lock"
      - "editors/zed/Cargo.toml"
      - "editors/vscode/package-lock.json"
      - "editors/vscode/package.json"
      - "tree-sitter-keron/package-lock.json"
      - "tree-sitter-keron/package.json"
      - ".github/workflows/security.yml"
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - ".node-version"
      - "deny.toml"
      - "crates/**/Cargo.toml"
      - "editors/zed/Cargo.lock"
      - "editors/zed/Cargo.toml"
      - "editors/vscode/package-lock.json"
      - "editors/vscode/package.json"
      - "tree-sitter-keron/package-lock.json"
      - "tree-sitter-keron/package.json"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-dependencies:
    name: Rust dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-audit@0.22.1
          fallback: none

      - name: Install cargo-deny
        uses: taiki-e/install-action@fd2f5e3d644b484055ebf4268f474c565f148f25 # v2
        with:
          tool: cargo-deny@0.19.8
          fallback: none

      - name: Audit workspace lockfile
        run: cargo audit --deny warnings

      - name: Audit Zed extension lockfile
        run: cargo audit --file editors/zed/Cargo.lock --deny warnings

      - name: Enforce dependency policy
        run: |
          cargo deny --locked check
          cargo deny --manifest-path editors/zed/Cargo.toml --locked check

  npm-audit:
    name: JavaScript advisories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Audit locked dependencies
        working-directory: editors/vscode
        run: npm audit --package-lock-only --audit-level=moderate

      - name: Audit tree-sitter tooling
        working-directory: tree-sitter-keron
        run: npm audit --package-lock-only --audit-level=moderate
